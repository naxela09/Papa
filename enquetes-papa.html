<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Documentaires</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #14171c; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }

  .screen { position: fixed; inset: 0; display: none; }
  .screen.active { display: flex; }

  /* --- Écran 1 : genres --- */
  #screenGenres {
    flex-direction: column;
    align-items: stretch; justify-content: center;
    background: #14171c;
    padding: 2.5vh 4vw;
    gap: 2.2vh;
  }
  .genreBtn {
    flex: 1;
    max-height: 24vh;
    display: flex; flex-direction: row;
    align-items: center; justify-content: flex-start;
    gap: 4vw;
    border: none;
    border-radius: 26px;
    padding: 0 6vw;
    color: #ffffff;
    font-size: 5.6vw;
    font-weight: 700;
    text-align: left;
    line-height: 1.1;
    box-shadow: 0 7px 0 rgba(0,0,0,0.35), 0 12px 20px rgba(0,0,0,0.4);
  }
  .genreBtn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.35), 0 5px 12px rgba(0,0,0,0.4); }
  .genreBtn .emoji { font-size: 13vw; line-height: 1; flex-shrink: 0; }
  #btnCrime   { background: #c94f4f; }
  #btnVoyage  { background: #2f8f6e; }
  #btnScience { background: #3d6fc9; }
  #btnHistory { background: #b8863f; }

  /* --- Écran 2 : grille de vidéos --- */
  #screenGrid {
    flex-direction: column;
    background: #14171c;
    padding: 9vh 3vw 3vh 3vw;
  }
  #videoGrid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3vw;
    overflow: hidden;
  }
  .videoTile {
    border: none;
    border-radius: 22px;
    overflow: hidden;
    padding: 0;
    background: #222;
    box-shadow: 0 6px 0 rgba(0,0,0,0.35), 0 10px 18px rgba(0,0,0,0.4);
    position: relative;
  }
  .videoTile:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.35), 0 4px 10px rgba(0,0,0,0.4); }
  .videoTile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .videoTile .playOverlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12vw;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 3px 10px rgba(0,0,0,0.6);
  }

  /* --- Écran 3 : lecteur --- */
  #screenPlayer { background: #000; }
  #playerHost { width: 100%; height: 100%; }

  /* --- Boutons communs --- */
  .roundBtn {
    position: fixed;
    background: rgba(20,20,20,0.6);
    border: 3px solid rgba(255,255,255,0.65);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    z-index: 10;
  }
  .roundBtn:active { background: rgba(60,60,60,0.75); }

  .homeBtnSmall { top: 3vh; right: 3vh; width: 13vw; height: 13vw; max-width: 70px; max-height: 70px; font-size: 6vw; }
  .backBtnSmall { top: 3vh; left: 3vh; width: 13vw; height: 13vw; max-width: 70px; max-height: 70px; font-size: 6vw; }

  .bigCtrlBtn { bottom: 3vh; width: 20vw; height: 20vw; max-width: 110px; max-height: 110px; font-size: 9vw; }
  #playPauseBtn { left: 4vw; }
  #backToGridBtn { right: 4vw; }

  #errorMsg {
    display: none;
    position: fixed; inset: 0;
    background: #14171c;
    color: #f4f1e8;
    align-items: center; justify-content: center;
    text-align: center;
    font-size: 5vw;
    padding: 10vw;
    z-index: 20;
  }
</style>
</head>
<body>

  <!-- Écran 1 : genres -->
  <div class="screen active" id="screenGenres">
    <button class="genreBtn" id="btnCrime" data-genre="crime">
      <span class="emoji">🔍</span>
      <span>Enquêtes<br>criminelles</span>
    </button>
    <button class="genreBtn" id="btnVoyage" data-genre="voyage">
      <span class="emoji">✈️</span>
      <span>Voyages &amp;<br>découvertes</span>
    </button>
    <button class="genreBtn" id="btnScience" data-genre="science">
      <span class="emoji">🔬</span>
      <span>Documentaires<br>scientifiques</span>
    </button>
    <button class="genreBtn" id="btnHistory" data-genre="history">
      <span class="emoji">🏛️</span>
      <span>Histoire</span>
    </button>
  </div>

  <!-- Écran 2 : grille de vidéos -->
  <div class="screen" id="screenGrid">
    <div class="roundBtn homeBtnSmall" id="homeFromGrid">🏠</div>
    <div id="videoGrid"></div>
  </div>

  <!-- Écran 3 : lecteur -->
  <div class="screen" id="screenPlayer">
    <div id="playerHost"></div>
    <div class="roundBtn homeBtnSmall" id="homeFromPlayer">🏠</div>
    <div class="roundBtn bigCtrlBtn" id="playPauseBtn">⏸️</div>
    <div class="roundBtn bigCtrlBtn" id="backToGridBtn">🔙</div>
  </div>

  <div id="errorMsg">
    Impossible de charger la vidéo ici.<br><br>Réessayez depuis le lien hébergé.
  </div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // Vidéos sélectionnées à la main par Naxela pour chaque genre
  var GENRES = {
    crime: {
      color: "#c94f4f",
      videos: ["9LsV49yfx90", "gsaFPJj_PHU", "Pd8CkjK5bkk", "Z41sg6dFvcQ", "QRXpI_Ehs28"]
    },
    voyage: {
      color: "#2f8f6e",
      videos: ["0brfntOpgwY", "xQrWVkTUM8Y", "wjCbDNRRoAA", "Varvw0zzU5o", "8fIDVbGy_5c"]
    },
    science: {
      color: "#3d6fc9",
      videos: ["XhoZzh-Fkss", "WECKD23xo_M", "jOzuUMk-ZRE", "v5YcH5X5Xgo", "KGqCRbqzvBI"]
    },
    history: {
      color: "#b8863f",
      videos: ["r_NwGvla7eQ", "9c_giLFxRno", "kQ98ded7_0g", "yRnNXc0CO5U"]
    }
  };

  var ytReady = false;
  var player = null;
  var currentGenre = null;

  function onYouTubeIframeAPIReady() { ytReady = true; }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function openGenre(genreKey) {
    currentGenre = genreKey;
    var grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    var videos = GENRES[genreKey].videos;

    // Adapter la grille : 2 colonnes, autant de lignes que nécessaire
    var rows = Math.ceil(videos.length / 2);
    grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';

    videos.forEach(function(videoId) {
      var tile = document.createElement('button');
      tile.className = 'videoTile';
      tile.innerHTML =
        '<img src="https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg" alt="">' +
        '<div class="playOverlay">▶️</div>';
      tile.addEventListener('click', function() { openPlayer(videoId); });
      grid.appendChild(tile);
    });

    showScreen('screenGrid');
  }

  function openPlayer(videoId) {
    showScreen('screenPlayer');

    function createPlayer() {
      player = new YT.Player('playerHost', {
        width: '100%',
        height: '100%',
        playerVars: {
          autoplay: 1,
          playsinline: 1,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          list: videoId,
          listType: 'playlist',
          loop: 1
        },
        events: {
          onReady: function(e) { e.target.playVideo(); setPlayPauseIcon(true); },
          onStateChange: function(e) {
            if (e.data === YT.PlayerState.PLAYING) setPlayPauseIcon(true);
            if (e.data === YT.PlayerState.PAUSED) setPlayPauseIcon(false);
          },
          onError: function() { document.getElementById('errorMsg').style.display = 'flex'; }
        }
      });
    }

    if (ytReady) {
      createPlayer();
    } else {
      window.onYouTubeIframeAPIReady = function() { ytReady = true; createPlayer(); };
    }
  }

  function setPlayPauseIcon(isPlaying) {
    document.getElementById('playPauseBtn').textContent = isPlaying ? '⏸️' : '▶️';
  }

  function destroyPlayer() {
    if (player && player.destroy) player.destroy();
    player = null;
    document.getElementById('playerHost').innerHTML = '';
    document.getElementById('errorMsg').style.display = 'none';
  }

  // --- Navigation ---
  document.querySelectorAll('.genreBtn').forEach(function(btn) {
    btn.addEventListener('click', function() { openGenre(btn.getAttribute('data-genre')); });
  });

  document.getElementById('homeFromGrid').addEventListener('click', function() {
    showScreen('screenGenres');
  });

  document.getElementById('homeFromPlayer').addEventListener('click', function() {
    destroyPlayer();
    showScreen('screenGenres');
  });

  document.getElementById('backToGridBtn').addEventListener('click', function() {
    destroyPlayer();
    openGenre(currentGenre);
  });

  document.getElementById('playPauseBtn').addEventListener('click', function() {
    if (!player) return;
    var state = player.getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  });
</script>

</body>
</html>
