<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Documentaires</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #14171c; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }

  #start {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: stretch; justify-content: center;
    background: #14171c;
    padding: 3vh 4vw;
    gap: 3vh;
  }

  .genreBtn {
    flex: 1;
    max-height: 30vh;
    display: flex; flex-direction: row;
    align-items: center; justify-content: flex-start;
    gap: 4vw;
    border: none;
    border-radius: 28px;
    padding: 0 6vw;
    color: #ffffff;
    font-size: 6.2vw;
    font-weight: 700;
    text-align: left;
    line-height: 1.15;
    box-shadow: 0 8px 0 rgba(0,0,0,0.35), 0 14px 24px rgba(0,0,0,0.4);
  }
  .genreBtn:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.35), 0 6px 14px rgba(0,0,0,0.4); }
  .genreBtn .emoji { font-size: 15vw; line-height: 1; flex-shrink: 0; }

  #btnCrime  { background: #c94f4f; }
  #btnVoyage { background: #2f8f6e; }
  #btnScience{ background: #3d6fc9; }

  #playerWrap {
    position: fixed; inset: 0;
    background: #000;
    display: none;
  }
  #playerWrap iframe { width: 100%; height: 100%; border: 0; display: block; }

  #homeBtn {
    position: fixed;
    bottom: 3vh; right: 3vh;
    width: 16vw; height: 16vw;
    max-width: 90px; max-height: 90px;
    background: rgba(30,30,30,0.55);
    border: 3px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8vw;
    color: #fff;
    z-index: 10;
  }

  #errorMsg {
    display: none;
    position: fixed; inset: 0;
    background: #14171c;
    color: #f4f1e8;
    align-items: center; justify-content: center;
    text-align: center;
    font-size: 5vw;
    padding: 10vw;
    z-index: 20;
  }
</style>
</head>
<body>

  <div id="start">
    <button class="genreBtn" id="btnCrime">
      <span class="emoji">🔍</span>
      <span>Enquêtes<br>criminelles</span>
    </button>
    <button class="genreBtn" id="btnVoyage">
      <span class="emoji">✈️</span>
      <span>Voyages &amp;<br>découvertes</span>
    </button>
    <button class="genreBtn" id="btnScience">
      <span class="emoji">🔬</span>
      <span>Documentaires<br>scientifiques</span>
    </button>
  </div>

  <div id="playerWrap">
    <div id="homeBtn">🏠</div>
  </div>

  <div id="errorMsg">
    Impossible de charger la vidéo ici.<br><br>Réessayez depuis le lien hébergé.
  </div>

<script>
  var PLAYLISTS = {
    crime:   "PLo2KopGHIN3qWaYOk1H3URsIYYyqDaFD-",   // Enquêtes criminelles France (Canal Crime)
    voyage:  "PLwzV0PjDdUNDcKkGDNrd13gz1jbdqFwe4",    // Voyages autour du monde
    science: "PLdf9pHBWxlcOhQCKAJO1H0G-lmpEiPTOu"     // L'Univers et le Cosmos (Documentaires scientifiques)
  };

  function startShow(playlistId) {
    document.getElementById('start').style.display = 'none';
    var wrap = document.getElementById('playerWrap');

    var iframe = document.createElement('iframe');
    iframe.src = "https://www.youtube.com/embed/videoseries?list=" + playlistId +
                 "&autoplay=1&playsinline=1&rel=0&modestbranding=1&loop=1";
    iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
    iframe.setAttribute('allowfullscreen', '');

    var fallbackTimer = setTimeout(function() {
      document.getElementById('errorMsg').style.display = 'flex';
    }, 4000);
    iframe.onload = function() { clearTimeout(fallbackTimer); };

    wrap.insertBefore(iframe, wrap.firstChild);
    wrap.style.display = 'block';
  }

  document.getElementById('btnCrime').addEventListener('click', function() { startShow(PLAYLISTS.crime); });
  document.getElementById('btnVoyage').addEventListener('click', function() { startShow(PLAYLISTS.voyage); });
  document.getElementById('btnScience').addEventListener('click', function() { startShow(PLAYLISTS.science); });

  document.getElementById('homeBtn').addEventListener('click', function() {
    var wrap = document.getElementById('playerWrap');
    var frame = wrap.querySelector('iframe');
    if (frame) frame.remove();
    wrap.style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('start').style.display = 'flex';
  });
</script>

</body>
</html>
