<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Documentaires</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #14171c; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }

  #start {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: stretch; justify-content: center;
    background: #14171c;
    padding: 2.5vh 4vw;
    gap: 2.2vh;
  }

  .genreBtn {
    flex: 1;
    max-height: 24vh;
    display: flex; flex-direction: row;
    align-items: center; justify-content: flex-start;
    gap: 4vw;
    border: none;
    border-radius: 26px;
    padding: 0 6vw;
    color: #ffffff;
    font-size: 5.6vw;
    font-weight: 700;
    text-align: left;
    line-height: 1.1;
    box-shadow: 0 7px 0 rgba(0,0,0,0.35), 0 12px 20px rgba(0,0,0,0.4);
  }
  .genreBtn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.35), 0 5px 12px rgba(0,0,0,0.4); }
  .genreBtn .emoji { font-size: 13vw; line-height: 1; flex-shrink: 0; }

  #btnCrime   { background: #c94f4f; }
  #btnVoyage  { background: #2f8f6e; }
  #btnScience { background: #3d6fc9; }
  #btnHistory { background: #b8863f; }

  #playerWrap {
    position: fixed; inset: 0;
    background: #000;
    display: none;
  }
  #playerHost { width: 100%; height: 100%; }

  .ctrlBtn {
    position: fixed;
    bottom: 3vh;
    width: 20vw; height: 20vw;
    max-width: 110px; max-height: 110px;
    background: rgba(20,20,20,0.6);
    border: 3px solid rgba(255,255,255,0.65);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9vw;
    color: #fff;
    z-index: 10;
  }
  .ctrlBtn:active { background: rgba(60,60,60,0.75); }

  #homeBtn   { top: 3vh; right: 3vh; bottom: auto; width: 13vw; height: 13vw; max-width: 70px; max-height: 70px; font-size: 6vw; }
  #playPauseBtn { left: 4vw; }
  #nextBtn      { right: 4vw; }

  #errorMsg {
    display: none;
    position: fixed; inset: 0;
    background: #14171c;
    color: #f4f1e8;
    align-items: center; justify-content: center;
    text-align: center;
    font-size: 5vw;
    padding: 10vw;
    z-index: 20;
  }
</style>
</head>
<body>

  <div id="start">
    <button class="genreBtn" id="btnCrime">
      <span class="emoji">🔍</span>
      <span>Enquêtes<br>criminelles</span>
    </button>
    <button class="genreBtn" id="btnVoyage">
      <span class="emoji">✈️</span>
      <span>Voyages &amp;<br>découvertes</span>
    </button>
    <button class="genreBtn" id="btnScience">
      <span class="emoji">🔬</span>
      <span>Documentaires<br>scientifiques</span>
    </button>
    <button class="genreBtn" id="btnHistory">
      <span class="emoji">🏛️</span>
      <span>Histoire</span>
    </button>
  </div>

  <div id="playerWrap">
    <div id="playerHost"></div>
    <div class="ctrlBtn" id="homeBtn">🏠</div>
    <div class="ctrlBtn" id="playPauseBtn">⏸️</div>
    <div class="ctrlBtn" id="nextBtn">⏭️</div>
  </div>

  <div id="errorMsg">
    Impossible de charger la vidéo ici.<br><br>Réessayez depuis le lien hébergé.
  </div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // Eigene, kuratierte Playlists von Naxela (alle "Nicht gelistet")
  var PLAYLISTS = {
    crime:   "PLZvoovvay0GY",   // Enquêtes criminelles
    voyage:  "PLQLlV-H9DVvE",   // voyages
    science: "PLSd09qepl5So",   // scientifique
    history: "PLFYmoi6pZ-7E"    // histoire
  };

  var ytReady = false;
  var player = null;
  var currentGenreKey = null;
  var saveTimer = null;

  function onYouTubeIframeAPIReady() {
    ytReady = true;
  }

  // --- Fortschritt speichern/lesen (bleibt lokal auf dem iPad) ---
  function loadProgress() {
    try {
      return JSON.parse(localStorage.getItem('docApp_progress') || '{}');
    } catch (e) {
      return {};
    }
  }
  function saveProgress(genreKey, index, seconds) {
    var all = loadProgress();
    all[genreKey] = { index: index, seconds: seconds };
    try { localStorage.setItem('docApp_progress', JSON.stringify(all)); } catch (e) {}
  }
  function getSavedPosition(genreKey) {
    var all = loadProgress();
    return all[genreKey] || null;
  }

  function startShow(genreKey, playlistId) {
    currentGenreKey = genreKey;
    document.getElementById('start').style.display = 'none';
    document.getElementById('playerWrap').style.display = 'block';

    var saved = getSavedPosition(genreKey);

    function createPlayer() {
      var vars = {
        listType: 'playlist',
        list: playlistId,
        autoplay: 1,
        loop: 1,
        playsinline: 1,
        controls: 1,
        rel: 0,
        modestbranding: 1
      };
      if (saved) {
        vars.index = saved.index;
        vars.start = Math.max(0, saved.seconds - 3); // 3 Sek. zurück, für sanften Wiedereinstieg
      }

      player = new YT.Player('playerHost', {
        width: '100%',
        height: '100%',
        playerVars: vars,
        events: {
          onReady: function(e) {
            e.target.playVideo();
            setPlayPauseIcon(true);
            startSaveTimer();
          },
          onStateChange: function(e) {
            if (e.data === YT.PlayerState.PLAYING) setPlayPauseIcon(true);
            if (e.data === YT.PlayerState.PAUSED) { setPlayPauseIcon(false); saveCurrentPosition(); }
            if (e.data === YT.PlayerState.ENDED) player.playVideo();
          },
          onError: function() {
            document.getElementById('errorMsg').style.display = 'flex';
          }
        }
      });
    }

    if (ytReady) {
      createPlayer();
    } else {
      window.onYouTubeIframeAPIReady = function() {
        ytReady = true;
        createPlayer();
      };
    }
  }

  function saveCurrentPosition() {
    if (!player || !currentGenreKey || !player.getCurrentTime) return;
    try {
      var idx = player.getPlaylistIndex ? player.getPlaylistIndex() : 0;
      var secs = player.getCurrentTime();
      saveProgress(currentGenreKey, idx, secs);
    } catch (e) {}
  }

  function startSaveTimer() {
    stopSaveTimer();
    saveTimer = setInterval(saveCurrentPosition, 5000); // alle 5 Sekunden merken
  }
  function stopSaveTimer() {
    if (saveTimer) { clearInterval(saveTimer); saveTimer = null; }
  }

  function setPlayPauseIcon(isPlaying) {
    document.getElementById('playPauseBtn').textContent = isPlaying ? '⏸️' : '▶️';
  }

  document.getElementById('btnCrime').addEventListener('click', function() { startShow('crime', PLAYLISTS.crime); });
  document.getElementById('btnVoyage').addEventListener('click', function() { startShow('voyage', PLAYLISTS.voyage); });
  document.getElementById('btnScience').addEventListener('click', function() { startShow('science', PLAYLISTS.science); });
  document.getElementById('btnHistory').addEventListener('click', function() { startShow('history', PLAYLISTS.history); });

  document.getElementById('playPauseBtn').addEventListener('click', function() {
    if (!player) return;
    var state = player.getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  });

  document.getElementById('nextBtn').addEventListener('click', function() {
    if (!player) return;
    player.nextVideo();
    saveCurrentPosition();
  });

  document.getElementById('homeBtn').addEventListener('click', function() {
    saveCurrentPosition();
    stopSaveTimer();
    if (player && player.destroy) player.destroy();
    player = null;
    document.getElementById('playerHost').innerHTML = '';
    document.getElementById('playerWrap').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('start').style.display = 'flex';
  });
</script>

</body>
</html>
